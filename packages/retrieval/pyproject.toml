[project]
name = "jurisflow-retrieval"
version = "0.1.0"
description = "Retrieval and legal-source integrations for Jurisflow."
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.28,<1.0",
  "jurisflow-shared",
  "lxml>=5,<7",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
