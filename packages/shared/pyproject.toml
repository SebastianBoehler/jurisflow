[project]
name = "jurisflow-shared"
version = "0.1.0"
description = "Shared settings, enums, and schemas for Jurisflow."
requires-python = ">=3.11"
dependencies = [
  "arq>=0.27,<1.0",
  "pydantic>=2.10,<3.0",
  "pydantic-settings>=2.6,<3.0",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
