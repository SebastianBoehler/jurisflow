[project]
name = "jurisflow-db"
version = "0.1.0"
description = "Database models and migrations for Jurisflow."
requires-python = ">=3.11"
dependencies = [
  "alembic>=1.14,<2.0",
  "pgvector>=0.3,<1.0",
  "psycopg[binary]>=3.2,<4.0",
  "sqlalchemy>=2.0.36,<3.0",
  "jurisflow-shared",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

