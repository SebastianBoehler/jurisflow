name: Feature request
description: Propose an improvement or new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Start with the user problem. Good requests explain why the change matters before describing a solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user or operational problem does this address?
      placeholder: We cannot currently ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
      placeholder: It should be possible to ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note any alternatives, workarounds, or tradeoffs.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, legal-source references, or domain context.
    validations:
      required: false
